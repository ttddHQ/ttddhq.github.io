<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ttdd.uno</title>
<meta name="description" content="Order out of chaos." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&family=Noto+Serif+SC:wght@300;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #05060a;
    --ink: #c8d0e0;
    --dim: #4a5266;
    --cyan: #00f0ff;
    --magenta: #ff2e88;
    --violet: #7b5cff;
    --scan: rgba(0, 240, 255, 0.025);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "JetBrains Mono", monospace;
    min-height: 100vh;
    display: grid;
    place-items: center;
    overflow: hidden;
    position: relative;
  }

  /* ── 背景：网格 + 径向辉光 ── */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(circle at 50% 40%, rgba(123, 92, 255, 0.12), transparent 55%),
      radial-gradient(circle at 80% 80%, rgba(255, 46, 136, 0.08), transparent 50%),
      linear-gradient(rgba(0, 240, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 240, 255, 0.04) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 44px 44px, 44px 44px;
    animation: drift 24s linear infinite;
  }

  @keyframes drift {
    from { background-position: 0 0, 0 0, 0 0, 0 0; }
    to   { background-position: 0 0, 0 0, 0 440px, 440px 0; }
  }

  /* ── CRT 扫描线 ── */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 30;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      var(--scan) 0,
      var(--scan) 1px,
      transparent 2px,
      transparent 4px
    );
    mix-blend-mode: overlay;
  }

  .vignette {
    position: fixed;
    inset: 0;
    z-index: 31;
    pointer-events: none;
    box-shadow: inset 0 0 220px 60px rgba(0, 0, 0, 0.9);
  }

  /* ── 主体 ── */
  main {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 24px;
  }

  .tag {
    font-size: 11px;
    letter-spacing: 0.5em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 38px;
    padding-left: 0.5em;
  }
  .tag::before { content: "// "; color: var(--cyan); }

  /* ── Logo with glitch ── */
  .logo {
    font-weight: 700;
    font-size: clamp(72px, 22vw, 220px);
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: #fff;
    position: relative;
    display: inline-block;
    text-shadow: 0 0 28px rgba(0, 240, 255, 0.35);
  }

  .logo::before,
  .logo::after {
    content: "ttdd";
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .logo::before {
    color: var(--magenta);
    animation: glitch-x 3.4s infinite steps(2, end);
    clip-path: inset(0 0 55% 0);
  }
  .logo::after {
    color: var(--cyan);
    animation: glitch-y 2.8s infinite steps(2, end);
    clip-path: inset(55% 0 0 0);
  }

  @keyframes glitch-x {
    0%, 92%, 100% { transform: translate(0); opacity: 0; }
    93% { transform: translate(-4px, -2px); opacity: 0.9; }
    96% { transform: translate(3px, 1px); opacity: 0.7; }
  }
  @keyframes glitch-y {
    0%, 90%, 100% { transform: translate(0); opacity: 0; }
    91% { transform: translate(4px, 2px); opacity: 0.9; }
    95% { transform: translate(-3px, -1px); opacity: 0.6; }
  }

  .dot { color: var(--cyan); }
  .tld {
    font-size: 0.32em;
    color: var(--dim);
    letter-spacing: 0.1em;
    vertical-align: super;
  }

  /* ── 哲学标语 ── */
  .slogan {
    font-family: "Noto Serif SC", serif;
    font-weight: 300;
    font-size: clamp(16px, 3.4vw, 26px);
    color: var(--ink);
    margin-top: 44px;
    letter-spacing: 0.32em;
    padding-left: 0.32em;
    opacity: 0;
    animation: fade-up 1.4s 0.4s forwards ease-out;
  }
  .slogan .sep { color: var(--magenta); margin: 0 0.2em; }

  .sub {
    font-size: 11px;
    letter-spacing: 0.42em;
    color: var(--dim);
    margin-top: 22px;
    text-transform: uppercase;
    opacity: 0;
    animation: fade-up 1.4s 0.9s forwards ease-out;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 底部状态行 ── */
  footer {
    position: fixed;
    bottom: 26px;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    padding: 0 clamp(20px, 5vw, 60px);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .live { color: var(--cyan); }
  .live::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    margin-right: 8px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse { 50% { opacity: 0.25; } }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .slogan, .sub { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="bg"></div>

  <main>
    <p class="tag">signal</p>
    <h1 class="logo" data-text="ttdd">ttdd<span class="tld">.uno</span></h1>
    <p class="slogan">order<span class="sep">/</span>out of<span class="sep">/</span>chaos</p>
    <p class="sub">we speak in signal, not in noise</p>
  </main>

  <footer>
    <span class="live" id="clock">connecting…</span>
    <span>ttdd.uno — v0.1</span>
  </footer>

  <div class="scanlines"></div>
  <div class="vignette"></div>

  <script>
    // 实时时钟，制造一种「系统在线」的感觉
    const clock = document.getElementById("clock");
    const pad = (n) => String(n).padStart(2, "0");
    function tick() {
      const d = new Date();
      clock.textContent = `online · ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
